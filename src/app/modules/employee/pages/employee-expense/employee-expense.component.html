<app-cash-balance-viewer [balanceSummary]="balanceSummary"></app-cash-balance-viewer>

<div class="flex min-w-full flex-col rounded-xl border border-muted/20 bg-background p-2">
  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="grid grid-cols-2 gap-x-6 gap-y-4">
      <!-- Row 1: Organization Name | Expense Date -->
      <div>
        <label class="mb-1 block text-sm font-medium text-muted-foreground">Organization Name</label>
        <input type="text" placeholder=" " readonly [value]="org?.orgName"
          class="w-full cursor-not-allowed rounded-md border border-muted/20 bg-gray-100 px-3 py-2 text-sm text-muted-foreground" />
        <input type="hidden" formControlName="organizationId" />
      </div>

      <div>
        <label class="mb-1 block text-sm font-medium text-muted-foreground">Expense Date</label>
        <input type="date" formControlName="expenseDate"
          class="w-full rounded-md border border-border bg-background px-3 py-2 text-sm text-muted-foreground focus:border-primary focus:ring-1 focus:ring-primary" />
        <div class="is__invalid-error" *ngIf="isFieldInvalid(form, 'expenseDate')">
          {{ getErrorMessage(form, 'expenseDate') }}
        </div>
      </div>

      <!-- Row 2: Payment Method | Employee Name -->
      <div>
        <label class="mb-1 block text-sm font-medium text-muted-foreground">Payment Method</label>
        <select formControlName="paymentMethod"
          class="w-full appearance-none rounded-md border border-border bg-background px-3 py-2 text-sm text-gray-500 focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary">
          <option value="" disabled selected>Select Payment Method</option>
          <option *ngFor="let method of allPaymentMethods" [value]="method">{{ method }}</option>
        </select>
        <div class="is__invalid-error" *ngIf="isFieldInvalid(form, 'paymentMethod')">
          {{ getErrorMessage(form, 'paymentMethod') }}
        </div>
      </div>

      <div>
        <label class="mb-1 block text-sm font-medium text-muted-foreground">Employee Name</label>
        <select formControlName="employeeId"
          class="w-full appearance-none rounded-md border border-border bg-background px-3 py-2 text-sm text-gray-500 focus:border-primary focus:outline-none focus:ring-1 focus:ring-primary">
          <option value="" selected>Select Employee</option>
          <option *ngFor="let emp of allEmployees" [value]="emp.id">{{ emp.fullName }}</option>
        </select>
        <div class="is__invalid-error" *ngIf="isFieldInvalid(form, 'employeeId')">
          {{ getErrorMessage(form, 'employeeId') }}
        </div>
      </div>

      <!-- Row 3: Expense Type | Reference -->
      <div>
        <app-dropdown [options]="allExpenseTypes" [(selectedOption)]="expenseType" placeholder="Select Expense Type"
          label="Expense Type" [required]="true" addButtonText="Add" (onSelect)="onCategorySelect($event)"
          (onAddNew)="onAddCategory()">
        </app-dropdown>
        <div class="is__invalid-error" *ngIf="isFieldInvalid(form, 'expenseType')">
          {{ getErrorMessage(form, 'expenseType') }}
        </div>
      </div>

      <div>
        <label class="mb-1 block text-sm font-medium text-muted-foreground">Reference</label>
        <input formControlName="reference"
          class="w-full rounded-md border border-border bg-background px-3 py-2 text-sm text-muted-foreground focus:border-primary focus:ring-1 focus:ring-primary" />
        <div class="is__invalid-error" *ngIf="isFieldInvalid(form, 'reference')">
          {{ getErrorMessage(form, 'reference') }}
        </div>
      </div>

      <!-- Row 4: Amount | Description -->
      <div>
        <label class="mb-1 block text-sm font-medium text-muted-foreground">Amount</label>
        <input type="number" formControlName="amount"
          class="w-full rounded-md border border-border bg-background px-3 py-2 text-sm text-muted-foreground focus:border-primary focus:ring-1 focus:ring-primary" />
        <div class="is__invalid-error" *ngIf="isFieldInvalid(form, 'amount')">
          {{ getErrorMessage(form, 'amount') }}
        </div>
      </div>

      <div>
        <label class="mb-1 block text-sm font-medium text-muted-foreground">Description</label>
        <textarea formControlName="description" rows="3"
          class="w-full resize-none rounded-md border border-border bg-background px-3 py-2 text-sm text-muted-foreground focus:border-primary focus:ring-1 focus:ring-primary"></textarea>
        <div class="is__invalid-error" *ngIf="isFieldInvalid(form, 'description')">
          {{ getErrorMessage(form, 'description') }}
        </div>
      </div>
    </div>

    <!-- Actions -->
    <div class="mt-6 flex justify-end gap-2 border-t border-border pt-4">
      <button type="submit" [disabled]="form.invalid" [ngClass]="{
          'bg-primary text-white hover:bg-primary/90': !form.invalid,
          'cursor-not-allowed bg-gray-300 text-gray-400': form.invalid
        }" class="flex items-center gap-2 rounded-md px-4 py-2 text-sm font-medium transition-colors">
        <svg-icon src="./assets/icons/heroicons/outline/minus-v2.svg" [svgClass]="'h-4 w-4'"></svg-icon>
        <span>Expense</span>
      </button>

      <button type="button" (click)="cancel()"
        class="flex items-center gap-2 rounded-md bg-destructive px-4 py-2 text-sm font-medium text-white transition-colors hover:bg-destructive/90">
        <svg-icon src="./assets/icons/heroicons/outline/back.svg" [svgClass]="'h-4 w-4'"></svg-icon>
        <span>Cancel</span>
      </button>
    </div>
  </form>

  <app-employee-expense-list
    [orgId]="org?.id!"
  [reload]="reloadList"
    (approve)="approveExpense($event)"
    (reject)="rejectExpense($event)">
  </app-employee-expense-list>

</div>
<app-expense-type-drawer></app-expense-type-drawer>
