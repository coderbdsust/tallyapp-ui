<!-- Card stats -->
<div class="flex flex-wrap">
  <!-- Cash Balance - Blue theme -->
  <div class="w-full px-4 lg:w-6/12 xl:w-4/12 mt-2">
    <app-card-stats [statSubtitle]="'CASH.BALANCE.CASH_BALANCE' | translate" [statTitle]="organizationBalance?.cashBalance"
      [statDescription]="'CASH.BALANCE.CASH_BALANCE_DESC' | translate"
      statPercentColor="text-emerald-500" statIconName="fas fa-wallet"
      borderColor="border-blue-500"
      statIconColor="bg-gradient-to-r from-blue-200 to-blue-400">
    </app-card-stats>
  </div>

  <!-- Total Expenses - Red theme -->
  <div class="w-full px-4 lg:w-6/12 xl:w-4/12 mt-2">
    <app-card-stats [statSubtitle]="'CASH.BALANCE.TOTAL_EXPENSES' | translate" [statTitle]="organizationBalance?.totalExpenses"
      [statDescription]="'CASH.BALANCE.TOTAL_EXPENSES_DESC' | translate"
      borderColor="border-red-500"
      statPercentColor="text-red-500" statIconName="fas fa-credit-card"
      statIconColor="bg-gradient-to-r from-red-200 to-red-400">
    </app-card-stats>
  </div>

  <!-- Net Income - Green theme -->
  <div class="w-full px-4 lg:w-6/12 xl:w-4/12 mt-2">
    <app-card-stats [statSubtitle]="'CASH.BALANCE.NET_INCOME' | translate" [statTitle]="organizationBalance?.netIncome"
      [statDescription]="'CASH.BALANCE.NET_INCOME_DESC' | translate"
      borderColor="border-green-500"
      statPercentColor="text-emerald-500" statIconName="fas fa-chart-line"
      statIconColor="bg-gradient-to-r from-green-200 to-green-400">
    </app-card-stats>
  </div>

  <!-- Accounts Receivable - Teal theme -->
  <div class="w-full px-4 lg:w-6/12 xl:w-4/12 mt-2" *ngIf="showFullBalance">
    <app-card-stats [statSubtitle]="'CASH.BALANCE.ACCOUNTS_RECEIVABLE' | translate"
      [statTitle]="organizationBalance?.accountsReceivable" statPercentColor="text-emerald-500"
      [statDescription]="'CASH.BALANCE.ACCOUNTS_RECEIVABLE_DESC' | translate"
      borderColor="border-teal-500"
      statIconName="fas fa-receipt"
      statIconColor="bg-gradient-to-r from-teal-200 to-teal-400">
    </app-card-stats>
  </div>

  <!-- Accounts Payable - Orange theme -->
  <div class="w-full px-4 lg:w-6/12 xl:w-4/12 mt-2" *ngIf="showFullBalance">
    <app-card-stats [statSubtitle]="'CASH.BALANCE.ACCOUNTS_PAYABLE' | translate" [statTitle]="organizationBalance?.accountsPayable"
      [statDescription]="'CASH.BALANCE.ACCOUNTS_PAYABLE_DESC' | translate"
      borderColor="border-orange-500"
      statPercentColor="text-orange-500" statIconName="fas fa-file-invoice-dollar"
      statIconColor="bg-gradient-to-r from-orange-200 to-orange-400">
    </app-card-stats>
  </div>

  <!-- Total Revenue - Emerald theme -->
  <div class="w-full px-4 lg:w-6/12 xl:w-4/12 mt-2" *ngIf="showFullBalance">
    <app-card-stats [statSubtitle]="'CASH.BALANCE.TOTAL_REVENUE' | translate" [statTitle]="organizationBalance?.totalRevenue"
    [statDescription]="'CASH.BALANCE.TOTAL_REVENUE_DESC' | translate"
    borderColor="border-emerald-500"
      statPercentColor="text-emerald-500" statIconName="fas fa-dollar-sign"
      statIconColor="bg-gradient-to-r from-emerald-200 to-emerald-400">
    </app-card-stats>
  </div>

  <!-- Total Assets - Purple theme -->
  <div class="w-full px-4 lg:w-6/12 xl:w-4/12 mt-2" *ngIf="showFullBalance">
    <app-card-stats [statSubtitle]="'CASH.BALANCE.TOTAL_ASSETS' | translate" [statTitle]="organizationBalance?.totalAssets"
      [statDescription]="'CASH.BALANCE.TOTAL_ASSETS_DESC' | translate"
      borderColor="border-purple-500"
      statPercentColor="text-purple-500" statIconName="fas fa-building"
      statIconColor="bg-gradient-to-r from-purple-200 to-purple-400">
    </app-card-stats>
  </div>

  <!-- Total Liabilities - Rose theme -->
  <div class="w-full px-4 lg:w-6/12 xl:w-4/12 mt-2" *ngIf="showFullBalance">
    <app-card-stats [statSubtitle]="'CASH.BALANCE.TOTAL_LIABILITIES' | translate" [statTitle]="organizationBalance?.totalLiabilities"
      [statDescription]="'CASH.BALANCE.TOTAL_LIABILITIES_DESC' | translate"
      borderColor="border-rose-500"
      statPercentColor="text-rose-500" statIconName="fas fa-exclamation-triangle"
      statIconColor="bg-gradient-to-r from-rose-200 to-rose-400">
    </app-card-stats>
  </div>

  <!-- Total Equity - Indigo theme -->
  <div class="w-full px-4 lg:w-6/12 xl:w-4/12 mt-2" *ngIf="showFullBalance">
    <app-card-stats [statSubtitle]="'CASH.BALANCE.TOTAL_EQUITY' | translate" [statTitle]="organizationBalance?.totalEquity"
      [statDescription]="'CASH.BALANCE.TOTAL_EQUITY_DESC' | translate"
      borderColor="border-indigo-500"
      statPercentColor="text-indigo-500" statIconName="fas fa-chart-pie"
      statIconColor="bg-gradient-to-r from-indigo-200 to-indigo-400">
    </app-card-stats>
  </div>
</div>
